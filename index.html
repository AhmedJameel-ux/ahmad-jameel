<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ahmad Jameel</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Cinzel:wght@400;600&family=IM+Fell+English&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #c9a84c;
    --dark-gold: #8b6914;
    --cream: #f0e6cc;
    --dark: #0a0a0f;
    --deep: #050508;
    --red: #8b1a1a;
    --accent: #d4af37;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--deep);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Cinzel', serif;
    overflow-x: hidden;
    cursor: crosshair;
  }

  /* Animated background - Survey Corps wings pattern */
  .bg-layer {
    position: fixed;
    inset: 0;
    z-index: 0;
    overflow: hidden;
  }

  .bg-layer::before {
    content: '';
    position: absolute;
    inset: 0;
    background: 
      radial-gradient(ellipse at 20% 50%, rgba(139,26,26,0.15) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 50%, rgba(201,168,76,0.08) 0%, transparent 60%),
      radial-gradient(ellipse at 50% 0%, rgba(139,26,26,0.2) 0%, transparent 50%);
  }

  /* Flying titan particles */
  .particle {
    position: absolute;
    width: 2px;
    height: 2px;
    background: var(--gold);
    border-radius: 50%;
    animation: float linear infinite;
    opacity: 0;
  }

  @keyframes float {
    0% { transform: translateY(100vh) translateX(0) rotate(0deg); opacity: 0; }
    10% { opacity: 0.6; }
    90% { opacity: 0.3; }
    100% { transform: translateY(-20px) translateX(100px) rotate(720deg); opacity: 0; }
  }

  /* Vertical scan line effect */
  .scanline {
    position: fixed;
    top: 0;
    left: -100%;
    width: 2px;
    height: 100vh;
    background: linear-gradient(to bottom, transparent, rgba(201,168,76,0.4), transparent);
    animation: scan 6s linear infinite;
    z-index: 1;
  }

  @keyframes scan {
    0% { left: -2px; }
    100% { left: 100vw; }
  }

  /* Main card */
  .card {
    position: relative;
    z-index: 10;
    width: 360px;
    padding: 50px 30px 40px;
    text-align: center;
    animation: cardReveal 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
  }

  @keyframes cardReveal {
    0% { opacity: 0; transform: translateY(40px) scale(0.95); }
    100% { opacity: 1; transform: translateY(0) scale(1); }
  }

  /* Profile image */
  .profile-wrap {
    position: relative;
    display: inline-block;
    margin-bottom: 8px;
    animation: profileDrop 1s cubic-bezier(0.16, 1, 0.3, 1) 0.3s both;
  }

  @keyframes profileDrop {
    0% { opacity: 0; transform: translateY(-30px); }
    100% { opacity: 1; transform: translateY(0); }
  }

  .profile-ring {
    position: absolute;
    inset: -6px;
    border-radius: 50%;
    border: 2px solid transparent;
    background: linear-gradient(135deg, var(--gold), var(--red), var(--gold)) border-box;
    -webkit-mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite: destination-out;
    mask-composite: exclude;
    animation: ringRotate 8s linear infinite;
  }

  @keyframes ringRotate {
    to { transform: rotate(360deg); }
  }

  .profile-ring-outer {
    position: absolute;
    inset: -14px;
    border-radius: 50%;
    border: 1px solid rgba(201,168,76,0.25);
    animation: ringRotate 12s linear infinite reverse;
  }

  .profile-img {
    width: 100px;
    height: 100px;
    border-radius: 50%;
    object-fit: cover;
    display: block;
    filter: sepia(20%) contrast(1.1);
    box-shadow: 0 0 30px rgba(139,26,26,0.5), 0 0 60px rgba(201,168,76,0.15);
  }

  /* Glow pulse on profile */
  .profile-glow {
    position: absolute;
    inset: -20px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(201,168,76,0.15) 0%, transparent 70%);
    animation: glowPulse 3s ease-in-out infinite;
  }

  @keyframes glowPulse {
    0%, 100% { transform: scale(1); opacity: 0.5; }
    50% { transform: scale(1.2); opacity: 1; }
  }

  /* Name */
  .name {
    font-family: 'Cinzel Decorative', cursive;
    font-size: 22px;
    font-weight: 900;
    color: var(--cream);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 6px;
    animation: fadeUp 0.8s ease 0.6s both;
    text-shadow: 0 0 20px rgba(201,168,76,0.4);
  }

  /* AOT Quote */
  .quote {
    font-family: 'IM Fell English', serif;
    font-style: italic;
    font-size: 13px;
    color: var(--gold);
    letter-spacing: 2px;
    margin-bottom: 36px;
    animation: fadeUp 0.8s ease 0.75s both;
    opacity: 0.9;
    text-shadow: 0 0 10px rgba(201,168,76,0.3);
    position: relative;
  }

  .quote::before, .quote::after {
    content: '⚔';
    font-size: 10px;
    margin: 0 8px;
    opacity: 0.6;
  }

  /* Divider */
  .divider {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 28px;
    animation: fadeUp 0.8s ease 0.85s both;
  }

  .divider-line {
    flex: 1;
    height: 1px;
    background: linear-gradient(to right, transparent, var(--gold), transparent);
  }

  .divider-diamond {
    width: 6px;
    height: 6px;
    background: var(--gold);
    transform: rotate(45deg);
  }

  /* Social buttons */
  .btn {
    display: flex;
    align-items: center;
    gap: 14px;
    width: 100%;
    padding: 14px 20px;
    margin-bottom: 12px;
    border: 1px solid rgba(201,168,76,0.25);
    background: rgba(255,255,255,0.03);
    color: var(--cream);
    text-decoration: none;
    font-family: 'Cinzel', serif;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    position: relative;
    overflow: hidden;
    transition: all 0.3s ease;
    backdrop-filter: blur(10px);
  }

  .btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(201,168,76,0.08), transparent);
    opacity: 0;
    transition: opacity 0.3s;
  }

  .btn::after {
    content: '';
    position: absolute;
    left: 0;
    top: 0;
    width: 3px;
    height: 100%;
    background: linear-gradient(to bottom, var(--gold), var(--red));
    transform: scaleY(0);
    transition: transform 0.3s ease;
    transform-origin: bottom;
  }

  .btn:hover {
    border-color: rgba(201,168,76,0.6);
    background: rgba(201,168,76,0.06);
    transform: translateX(4px);
    box-shadow: 0 0 20px rgba(201,168,76,0.1), inset 0 0 20px rgba(201,168,76,0.03);
    color: var(--gold);
  }

  .btn:hover::before { opacity: 1; }
  .btn:hover::after { transform: scaleY(1); }

  .btn-icon {
    width: 32px;
    height: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
  }

  .btn-text { flex: 1; text-align: left; }
  .btn-arrow {
    font-size: 10px;
    opacity: 0.5;
    transition: opacity 0.3s, transform 0.3s;
  }
  .btn:hover .btn-arrow { opacity: 1; transform: translateX(4px); }

  /* Button entrance animations */
  .btn:nth-child(1) { animation: fadeUp 0.6s ease 1s both; }
  .btn:nth-child(2) { animation: fadeUp 0.6s ease 1.1s both; }
  .btn:nth-child(3) { animation: fadeUp 0.6s ease 1.2s both; }
  .btn:nth-child(4) { animation: fadeUp 0.6s ease 1.3s both; }

  @keyframes fadeUp {
    0% { opacity: 0; transform: translateY(20px); }
    100% { opacity: 1; transform: translateY(0); }
  }

  /* Telegram blue tint */
  .btn-telegram { border-left-color: rgba(39,140,195,0.4); }
  .btn-telegram:hover { border-color: rgba(39,140,195,0.7); box-shadow: 0 0 20px rgba(39,140,195,0.15); color: #5bc8f5; }
  .btn-telegram:hover::after { background: linear-gradient(to bottom, #27A7E5, #1a7ab8); }

  .btn-instagram:hover { border-color: rgba(225,48,108,0.7); box-shadow: 0 0 20px rgba(225,48,108,0.15); color: #f77737; }
  .btn-instagram:hover::after { background: linear-gradient(to bottom, #f77737, #e1306c); }

  .btn-facebook:hover { border-color: rgba(66,103,178,0.7); box-shadow: 0 0 20px rgba(66,103,178,0.15); color: #4267B2; }
  .btn-facebook:hover::after { background: linear-gradient(to bottom, #4267B2, #29487d); }

  .btn-whatsapp:hover { border-color: rgba(37,211,102,0.7); box-shadow: 0 0 20px rgba(37,211,102,0.15); color: #25D366; }
  .btn-whatsapp:hover::after { background: linear-gradient(to bottom, #25D366, #128C7E); }

  /* Music player */
  .music-bar {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    align-items: center;
    gap: 12px;
    background: rgba(10,10,15,0.9);
    border: 1px solid rgba(201,168,76,0.2);
    padding: 10px 16px;
    backdrop-filter: blur(20px);
    z-index: 100;
    animation: fadeUp 0.8s ease 1.5s both;
  }

  .music-title {
    font-family: 'Cinzel', serif;
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--gold);
    white-space: nowrap;
  }

  .music-btn {
    background: none;
    border: 1px solid rgba(201,168,76,0.4);
    color: var(--gold);
    width: 28px;
    height: 28px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-size: 10px;
    transition: all 0.2s;
    flex-shrink: 0;
  }

  .music-btn:hover { background: rgba(201,168,76,0.15); border-color: var(--gold); }

  .music-wave {
    display: flex;
    align-items: center;
    gap: 2px;
    height: 16px;
  }

  .wave-bar {
    width: 2px;
    background: var(--gold);
    border-radius: 1px;
    animation: wave 0.8s ease-in-out infinite;
    opacity: 0.7;
  }

  .wave-bar:nth-child(1) { animation-delay: 0s; height: 4px; }
  .wave-bar:nth-child(2) { animation-delay: 0.1s; height: 8px; }
  .wave-bar:nth-child(3) { animation-delay: 0.2s; height: 12px; }
  .wave-bar:nth-child(4) { animation-delay: 0.3s; height: 8px; }
  .wave-bar:nth-child(5) { animation-delay: 0.4s; height: 4px; }

  .wave-bar.paused { animation-play-state: paused; height: 4px !important; }

  @keyframes wave {
    0%, 100% { transform: scaleY(0.5); }
    50% { transform: scaleY(1.5); }
  }

  /* Slash effect on click */
  .slash {
    position: fixed;
    pointer-events: none;
    z-index: 999;
    width: 3px;
    height: 0;
    background: linear-gradient(to bottom, transparent, var(--gold), var(--red), transparent);
    transform-origin: top center;
    animation: slashAnim 0.4s ease forwards;
  }

  @keyframes slashAnim {
    0% { height: 0; opacity: 1; }
    50% { height: 150px; opacity: 0.8; }
    100% { height: 150px; opacity: 0; }
  }

  /* Corner decorations */
  .corner {
    position: fixed;
    width: 40px;
    height: 40px;
    opacity: 0.3;
  }
  .corner-tl { top: 20px; left: 20px; border-top: 1px solid var(--gold); border-left: 1px solid var(--gold); }
  .corner-tr { top: 20px; right: 20px; border-top: 1px solid var(--gold); border-right: 1px solid var(--gold); }
  .corner-bl { bottom: 20px; left: 20px; border-bottom: 1px solid var(--gold); border-left: 1px solid var(--gold); }
  .corner-br { bottom: 20px; right: 20px; border-bottom: 1px solid var(--gold); border-right: 1px solid var(--gold); }
</style>
</head>
<body>

<!-- Background -->
<div class="bg-layer"></div>
<div class="scanline"></div>

<!-- Corner decorations -->
<div class="corner corner-tl"></div>
<div class="corner corner-tr"></div>
<div class="corner corner-bl"></div>
<div class="corner corner-br"></div>

<!-- Main Card -->
<div class="card">

  <!-- Profile -->
  <div class="profile-wrap">
    <div class="profile-glow"></div>
    <div class="profile-ring-outer"></div>
    <div class="profile-ring"></div>
    <img 
      class="profile-img" 
      src="https://i.ibb.co/m5jvHHNF/ahmadddddddddd.jpg"
      onerror="this.style.background='linear-gradient(135deg,#8b1a1a,#0a0a0f)'; this.src=''"
      alt="Ahmad Jameel"
    />
  </div>

  <h1 class="name">Ahmad Jameel</h1>
  <p class="quote">Shinzou wo Sasageyo</p>

  <div class="divider">
    <div class="divider-line"></div>
    <div class="divider-diamond"></div>
    <div class="divider-line"></div>
  </div>

  <!-- Social Links -->
  <a href="https://t.me/AHMADJAMEELL" target="_blank" class="btn btn-telegram">
    <span class="btn-icon">✈</span>
    <span class="btn-text">Telegram</span>
    <span class="btn-arrow">▶</span>
  </a>

  <a href="https://www.instagram.com/ahmad_jameel019" target="_blank" class="btn btn-instagram">
    <span class="btn-icon">◈</span>
    <span class="btn-text">Instagram</span>
    <span class="btn-arrow">▶</span>
  </a>

  <a href="https://www.facebook.com/ahmad.kingkurd" target="_blank" class="btn btn-facebook">
    <span class="btn-icon">ƒ</span>
    <span class="btn-text">Facebook</span>
    <span class="btn-arrow">▶</span>
  </a>

  <a href="https://wa.me/9647518343447" target="_blank" class="btn btn-whatsapp">
    <span class="btn-icon">✆</span>
    <span class="btn-text">WhatsApp</span>
    <span class="btn-arrow">▶</span>
  </a>

</div>

<!-- Music Player -->
<div class="music-bar" id="musicBar">
  <button class="music-btn" id="playBtn" onclick="toggleMusic()">▶</button>
  <div class="music-wave">
    <div class="wave-bar paused" id="w1"></div>
    <div class="wave-bar paused" id="w2"></div>
    <div class="wave-bar paused" id="w3"></div>
    <div class="wave-bar paused" id="w4"></div>
    <div class="wave-bar paused" id="w5"></div>
  </div>
  <span class="music-title">AOT — YOUSEI TEIKOKU</span>
</div>

<!-- Hidden Audio - AOT OST (YouTube embed fallback) -->
<audio id="bgMusic" loop preload="none">
  <!-- User can replace with actual audio file path -->
  <source src="https://www.youtube.com/watch?v=xyz" type="audio/mpeg">
</audio>

<script>
  // Generate floating particles
  const bg = document.querySelector('.bg-layer');
  for (let i = 0; i < 40; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.cssText = `
      left: ${Math.random() * 100}%;
      width: ${Math.random() * 3 + 1}px;
      height: ${Math.random() * 3 + 1}px;
      animation-duration: ${Math.random() * 15 + 8}s;
      animation-delay: ${Math.random() * 10}s;
    `;
    bg.appendChild(p);
  }

  // Slash effect on click
  document.addEventListener('click', (e) => {
    if (e.target.closest('.btn') || e.target.closest('.music-btn')) return;
    const slash = document.createElement('div');
    slash.className = 'slash';
    slash.style.cssText = `
      left: ${e.clientX}px;
      top: ${e.clientY - 20}px;
      transform: rotate(${Math.random() * 60 - 30}deg);
    `;
    document.body.appendChild(slash);
    setTimeout(() => slash.remove(), 500);
  });

  // Music toggle
  let playing = false;
  const waves = document.querySelectorAll('.wave-bar');

  function toggleMusic() {
    playing = !playing;
    const btn = document.getElementById('playBtn');
    
    if (playing) {
      btn.textContent = '⏸';
      waves.forEach(w => w.classList.remove('paused'));
      // Try to play audio
      const audio = document.getElementById('bgMusic');
      // Since we can't host the actual file, open YouTube
      window.open('https://www.youtube.com/watch?v=P8-4SHm5d0Y', '_blank');
    } else {
      btn.textContent = '▶';
      waves.forEach(w => w.classList.add('paused'));
    }
  }

  // Animate wave bars differently
  waves.forEach((w, i) => {
    w.style.animationDelay = `${i * 0.1}s`;
  });
</script>

</body>
</html>
